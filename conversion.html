<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvera Daily Conversion Input</title>
    <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/report-billing.css">

</head>
<body>
  <main class="card">
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Daily Entry</div>
        <h1>Kelvera Conversion Tracker</h1>
        <p class="lead">Enter today's conversion count for billing and reporting workflows.</p>
        <div class="today-date" id="todayDate">Today:</div>
      </div>

      <div class="form-panel">
        <h2>Conversion Input</h2>
        <form id="conversionForm" class="form-grid">
          <label for="conversionsInput">
            Today's Conversions
            <input
              id="conversionsInput"
              type="number"
              min="0"
              step="1"
              inputmode="numeric"
              pattern="[0-9]*"
              placeholder="Enter today's conversions"
              required
            >
          </label>
          <button type="submit">Save</button>
        </form>
        <div id="message" class="msg"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASES = ["https://admin.flipchat.link"];
    const todayDate = document.getElementById("todayDate");
    const form = document.getElementById("conversionForm");
    const input = document.getElementById("conversionsInput");
    const message = document.getElementById("message");

    function getIstDateKey(date = new Date()) {
      const dt = new Date(date.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, "0");
      const d = String(dt.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatIstDate(date = new Date()) {
      return date.toLocaleDateString("en-IN", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        timeZone: "Asia/Kolkata",
      });
    }

    const formatted = formatIstDate();
    const todayKey = getIstDateKey();

    todayDate.textContent = `Today: ${formatted}`;

    input.addEventListener("input", () => {
      input.value = input.value.replace(/\D/g, "");
    });

    async function fetchTodayConversion() {
      let lastError = null;
      for (const base of API_BASES) {
        try {
          const res = await fetch(`${base}/api/conversions`, {
            method: "GET",
            mode: "cors",
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            return {
              ok: false,
              message: data.error || `Request failed (${res.status})`,
            };
          }
          return { ok: true, data };
        } catch {
          lastError = `Could not reach ${base}`;
        }
      }
      return {
        ok: false,
        message:
          lastError ||
          "Network/CORS error. Check that the API is deployed and reachable.",
      };
    }

    async function saveTodayConversion(conversions) {
      let lastError = null;
      for (const base of API_BASES) {
        try {
          const res = await fetch(`${base}/api/conversions`, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ conversions }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            return {
              ok: false,
              message: data.error || `Request failed (${res.status})`,
            };
          }
          return { ok: true, data };
        } catch {
          lastError = `Could not reach ${base}`;
        }
      }
      return {
        ok: false,
        message:
          lastError ||
          "Network/CORS error. Check that the API is deployed and reachable.",
      };
    }

    function showSavedMessage(conversions, updatedAtIso) {
      const updatedAtIst = new Date(updatedAtIso).toLocaleTimeString("en-IN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
        timeZone: "Asia/Kolkata",
      });
      message.textContent = `Saved ${conversions} conversions for ${formatted}. Last updated: ${updatedAtIst} IST.`;
      message.classList.add("show");
    }

    async function loadTodayFromApi() {
      const out = await fetchTodayConversion();
      if (!out.ok || !out.data) {
        return;
      }
      if (out.data.dateKey !== todayKey) {
        return;
      }
      const existing = Number(out.data.conversions ?? 0);
      if (Number.isFinite(existing) && existing >= 0) {
        input.value = String(Math.floor(existing));
      }
      if (out.data.updatedAt) {
        showSavedMessage(Math.floor(existing), out.data.updatedAt);
      }
    }

    void loadTodayFromApi();

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      void (async () => {
        const value = Number(input.value);
        const safeValue = Number.isFinite(value) && value >= 0 ? Math.floor(value) : 0;

        const out = await saveTodayConversion(safeValue);
        if (!out.ok || !out.data) {
          message.textContent = out.message || "Could not save conversions.";
          message.classList.add("show");
          return;
        }
        showSavedMessage(safeValue, out.data.updatedAt || new Date().toISOString());
      })();
    });
  </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
