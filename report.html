<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipchat Group Reports</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px 0;
        color: #1a5f63;
      }
      p {
        margin: 0;
      }
      form {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      input {
        flex: 1 1 320px;
        min-width: 220px;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 12px 16px;
        color: #fff;
        font-weight: 600;
        background: linear-gradient(135deg, #25d366 0%, #1a5f63 100%);
        cursor: pointer;
      }
      button[disabled] {
        background: #9ca3af;
        cursor: not-allowed;
      }
      .msg {
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
      }
      .error {
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #991b1b;
      }
      .muted {
        color: #64748b;
      }
      .results {
        margin-top: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
      }
      .results-head {
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
        padding: 12px 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px 14px;
        border-bottom: 1px solid #f1f5f9;
        text-align: left;
      }
      th.right,
      td.right {
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Group Click Reports</h1>
        <p class="muted">
          Enter a valid <code>Flipchat.link/pro/{slug}</code> slug to view grouped clicks (daily IST).
        </p>

        <form id="reportForm">
          <input id="slugInput" type="text" placeholder="Enter slug exactly" />
          <button id="submitBtn" type="submit">Get Report</button>
        </form>

        <div id="message"></div>
        <div id="results"></div>
      </div>
    </div>

    <script>
      // Reports API host for your admin deployment.
      const API_BASES = ["https://admin.flipchat.link"];

      const form = document.getElementById("reportForm");
      const slugInput = document.getElementById("slugInput");
      const submitBtn = document.getElementById("submitBtn");
      const message = document.getElementById("message");
      const results = document.getElementById("results");

      function showError(text) {
        message.className = "msg error";
        message.textContent = text;
      }

      function clearMessage() {
        message.className = "";
        message.textContent = "";
      }

      function renderResults(data) {
        if (!data || !Array.isArray(data.groupData)) {
          results.innerHTML = "";
          return;
        }

        if (data.groupData.length === 0) {
          results.innerHTML = `
            <div class="msg muted">No clicks found for this slug on ${data.date} (IST).</div>
          `;
          return;
        }

        const rows = data.groupData
          .map(
            (r) => `
            <tr>
              <td>${r.group}</td>
              <td class="right">${r.clicks}</td>
              <td class="right">${r.percentage}%</td>
            </tr>
          `
          )
          .join("");

        results.innerHTML = `
          <div class="results">
            <div class="results-head">
              <div><strong>/pro/${data.slug}</strong> - ${data.date} (IST)</div>
              <div class="muted" style="margin-top:4px;">Total clicks: ${data.totalClicks}</div>
            </div>
            <table>
              <thead>
                <tr>
                  <th>Group</th>
                  <th class="right">Clicks</th>
                  <th class="right">%</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      async function tryFetchReport(slug) {
        let lastError = null;

        for (const base of API_BASES) {
          const url = `${base}/api/reports/${encodeURIComponent(slug)}`;
          try {
            // Keep this as a simple GET request without custom headers
            // so static pages do not trigger unnecessary preflight failures.
            const res = await fetch(url, { method: "GET", mode: "cors" });
            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              return {
                ok: false,
                message: data.error || `Request failed (${res.status})`,
              };
            }

            return { ok: true, data };
          } catch (err) {
            lastError = `Could not reach ${base}`;
          }
        }

        return {
          ok: false,
          message:
            lastError ||
            "Network/CORS error. Check that the API is deployed and reachable.",
        };
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearMessage();
        results.innerHTML = "";

        const slug = slugInput.value.trim();
        if (!slug) {
          showError("Please enter a slug.");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Loading...";

        try {
          const out = await tryFetchReport(slug);
          if (!out.ok) {
            showError(out.message || "Could not fetch report for this slug.");
            return;
          }

          renderResults(out.data);
        } catch (err) {
          showError("Unexpected error while loading report.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Get Report";
        }
      });
    </script>
  </body>
</html>
