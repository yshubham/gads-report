<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvera Group Click Reports</title>
  <style>
    :root {
      --bg: #f4fbf5;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --text: #173227;
      --muted: #5f7b6a;
      --accent: #78b88a;
      --accent-deep: #4e8b61;
      --line: #d6e8d8;
      --shadow: 0 20px 50px rgba(69, 113, 83, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(162, 212, 175, 0.4), transparent 32%),
        radial-gradient(circle at bottom right, rgba(203, 235, 207, 0.85), transparent 28%),
        linear-gradient(180deg, #eff9f0 0%, #e7f5e9 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
    }

    .hero,
    .calculator {
      padding: 40px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(120, 184, 138, 0.14), rgba(255, 255, 255, 0.65));
      border-right: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(120, 184, 138, 0.15);
      color: var(--accent-deep);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.02;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
      max-width: 42ch;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.72);
    }

    .calculator h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fcfffc;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(120, 184, 138, 0.16);
      transform: translateY(-1px);
    }

    button {
      margin-top: 4px;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #78b88a 0%, #4e8b61 100%);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 24px rgba(78, 139, 97, 0.28);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }

    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.93rem;
    }

    .msg.error {
      border: 1px solid #f7bdbd;
      background: #fff1f1;
      color: #8a2f2f;
    }

    .msg.success {
      border: 1px solid var(--line);
      background: #f7fcf7;
      color: var(--muted);
    }

    .result {
      margin-top: 20px;
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, #eef8ef 0%, #ffffff 100%);
      border: 1px solid var(--line);
    }

    .result-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .total {
      margin: 8px 0 16px;
      font-size: clamp(2.1rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--accent-deep);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid var(--line);
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid #ecf5ed;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      color: var(--muted);
      font-weight: 700;
      background: #f7fcf7;
    }

    td.right,
    th.right {
      text-align: right;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .empty-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .hero,
      .calculator {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Reporting</div>
        <h1>Kelvera Group Click Reports</h1>
        <p class="lead">
          Enter an exact <code>/pro/{slug}</code> value to pull grouped click data for the current IST day.
        </p>
      </div>

      <div class="calculator">
        <h2>Report Input</h2>
        <form id="reportForm" class="form-grid">
          <label for="slugInput">
            Pro Slug
            <input id="slugInput" type="text" placeholder="Enter slug exactly">
          </label>
          <button id="submitBtn" type="submit">Get Report</button>
        </form>

        <div id="message"></div>
        <div id="results"></div>
      </div>
    </section>
  </main>

  <script>
    const API_BASES = ["https://admin.flipchat.link"];

    const form = document.getElementById("reportForm");
    const slugInput = document.getElementById("slugInput");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const results = document.getElementById("results");

    function showMessage(text, kind) {
      message.className = `msg ${kind}`;
      message.textContent = text;
    }

    function clearMessage() {
      message.className = "";
      message.textContent = "";
    }

    function clearResults() {
      results.innerHTML = "";
    }

    function renderResults(data) {
      if (!data || !Array.isArray(data.groupData)) {
        clearResults();
        return;
      }

      if (data.groupData.length === 0) {
        results.innerHTML = `
          <p class="empty-note">No clicks found for this slug on ${data.date} (IST).</p>
        `;
        return;
      }

      const rows = data.groupData.map((row) => `
        <tr>
          <td>${row.group}</td>
          <td class="right">${row.clicks}</td>
          <td class="right">${row.percentage}%</td>
        </tr>
      `).join("");

      results.innerHTML = `
        <div class="result">
          <p class="result-label">Daily report</p>
          <div class="total">${data.totalClicks} clicks</div>
          <p class="empty-note" style="margin-top: 0; margin-bottom: 12px;">
            /pro/${data.slug} • ${data.date} (IST)
          </p>
          <table>
            <thead>
              <tr>
                <th>Group</th>
                <th class="right">Clicks</th>
                <th class="right">%</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    async function tryFetchReport(slug) {
      let lastError = null;

      for (const base of API_BASES) {
        const url = `${base}/api/reports/${encodeURIComponent(slug)}`;
        try {
          const res = await fetch(url, { method: "GET", mode: "cors" });
          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            return {
              ok: false,
              message: data.error || `Request failed (${res.status})`,
            };
          }

          return { ok: true, data };
        } catch {
          lastError = `Could not reach ${base}`;
        }
      }

      return {
        ok: false,
        message:
          lastError ||
          "Network/CORS error. Check that the API is deployed and reachable.",
      };
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();
      clearResults();

      const slug = slugInput.value.trim();
      if (!slug) {
        showMessage("Please enter a slug.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Loading...";

      try {
        const out = await tryFetchReport(slug);
        if (!out.ok) {
          showMessage(out.message || "Could not fetch report for this slug.", "error");
          return;
        }

        showMessage("Report loaded successfully.", "success");
        renderResults(out.data);
      } catch {
        showMessage("Unexpected error while loading report.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Get Report";
      }
    });
  </script>
</body>
</html>
