<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvera Google Ads Reporting Billing</title>
    <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/report-billing.css">

</head>
<body>
  <main class="card">
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Billing Estimate</div>
        <h1>Kelvera Google Ads Reporting</h1>
        <p class="lead">
          Enter the client activity values to calculate the estimated billing amount instantly.
        </p>
      </div>

      <div class="calculator">
        <h2>Client Inputs</h2>
        <div class="form-grid">
          <label for="clicks">
            Clicks
            <input id="clicks" type="number" min="0" step="1" value="0" placeholder="Enter clicks">
          </label>

          <label for="conversions">
            Conversion
            <input id="conversions" type="number" min="0" step="1" value="0" placeholder="Enter conversions">
          </label>

          <label for="accounts">
            No of Accounts
            <input id="accounts" type="number" min="0" step="1" value="0" placeholder="Enter number of accounts">
          </label>
        </div>

        <div class="result">
          <p class="result-label">Estimated Bill</p>
          <div class="total" id="totalBill">₹0.00</div>

        </div>
      </div>
    </section>
  </main>

  <script>
    const elements = {
      clicks: document.getElementById("clicks"),
      conversions: document.getElementById("conversions"),
      accounts: document.getElementById("accounts"),
      totalBill: document.getElementById("totalBill")
    };

    function currency(value) {
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 2
      }).format(value);
    }

    function safeNumber(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
    }

    function updateBill() {
      const clicks = safeNumber(elements.clicks.value);
      const conversions = safeNumber(elements.conversions.value);
      const accounts = safeNumber(elements.accounts.value);
      const baseProduct = clicks * conversions * accounts;
      const randomMultiplier = Math.floor(Math.random() * 51) + 725;
      const total = baseProduct * randomMultiplier;

      elements.totalBill.textContent = currency(total);
    }

    Object.values(elements)
      .filter((element) => element.tagName === "INPUT")
      .forEach((input) => input.addEventListener("input", updateBill));

    updateBill();
  </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
