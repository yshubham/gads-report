<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvera Google Ads Reporting Billing</title>
  <style>
    :root {
      --bg: #f4fbf5;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --text: #173227;
      --muted: #5f7b6a;
      --accent: #78b88a;
      --accent-deep: #4e8b61;
      --line: #d6e8d8;
      --shadow: 0 20px 50px rgba(69, 113, 83, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(162, 212, 175, 0.4), transparent 32%),
        radial-gradient(circle at bottom right, rgba(203, 235, 207, 0.85), transparent 28%),
        linear-gradient(180deg, #eff9f0 0%, #e7f5e9 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
    }

    .hero,
    .calculator {
      padding: 40px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(120, 184, 138, 0.14), rgba(255, 255, 255, 0.65));
      border-right: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(120, 184, 138, 0.15);
      color: var(--accent-deep);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.02;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
      max-width: 42ch;
    }

    .pricing-box {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
    }

    .pricing-box h2,
    .calculator h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
    }

    .rate-list {
      display: grid;
      gap: 12px;
    }

    .rate-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      background: #f7fcf7;
      border-radius: 14px;
      color: var(--muted);
    }

    .rate-item strong {
      color: var(--text);
      font-size: 1rem;
    }

    .calculator {
      background: rgba(255, 255, 255, 0.72);
    }

    .form-grid {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      background: #fcfffc;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(120, 184, 138, 0.16);
      transform: translateY(-1px);
    }

    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(180deg, #eef8ef 0%, #ffffff 100%);
      border: 1px solid var(--line);
    }

    .result-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .total {
      margin: 8px 0 16px;
      font-size: clamp(2.1rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--accent-deep);
    }

    .breakdown {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .breakdown div {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    .note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .hero,
      .calculator {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Billing Estimate</div>
        <h1>Kelvera Google Ads Reporting</h1>
        <p class="lead">
          Enter the client activity values to calculate the estimated billing amount instantly.
        </p>
      </div>

      <div class="calculator">
        <h2>Client Inputs</h2>
        <div class="form-grid">
          <label for="clicks">
            Clicks
            <input id="clicks" type="number" min="0" step="1" value="0" placeholder="Enter clicks">
          </label>

          <label for="conversions">
            Conversion
            <input id="conversions" type="number" min="0" step="1" value="0" placeholder="Enter conversions">
          </label>

          <label for="accounts">
            No of Accounts
            <input id="accounts" type="number" min="0" step="1" value="0" placeholder="Enter number of accounts">
          </label>
        </div>

        <div class="result">
          <p class="result-label">Estimated Bill</p>
          <div class="total" id="totalBill">₹0.00</div>

        </div>
      </div>
    </section>
  </main>

  <script>
    const elements = {
      clicks: document.getElementById("clicks"),
      conversions: document.getElementById("conversions"),
      accounts: document.getElementById("accounts"),
      totalBill: document.getElementById("totalBill")
    };

    function currency(value) {
      return new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 2
      }).format(value);
    }

    function safeNumber(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : 0;
    }

    function updateBill() {
      const clicks = safeNumber(elements.clicks.value);
      const conversions = safeNumber(elements.conversions.value);
      const accounts = safeNumber(elements.accounts.value);
      const baseProduct = clicks * conversions * accounts;
      const randomMultiplier = Math.floor(Math.random() * 51) + 725;
      const total = baseProduct * randomMultiplier;

      elements.totalBill.textContent = currency(total);
    }

    Object.values(elements)
      .filter((element) => element.tagName === "INPUT")
      .forEach((input) => input.addEventListener("input", updateBill));

    updateBill();
  </script>
</body>
</html>
