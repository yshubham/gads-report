<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client spend dashboard — Kelvera</title>
    <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/report-billing.css">

</head>
<body>
  <main class="card">
    <div class="toolbar">
      <div class="toolbar-left">
        <label for="reportDate">Report date (IST)
          <input type="date" id="reportDate" autocomplete="off">
        </label>
        <button type="button" class="btn-refresh" id="refreshBtn">Refresh</button>
      </div>
      <div class="toolbar-signout">
        <a href="#" id="logoutLink">Sign out</a>
      </div>
    </div>
    <div class="banner">
      <p class="banner-msg" id="msgError" role="alert"></p>
      <p class="banner-msg warn" id="msgWarn"></p>
    </div>
    <p class="loading-line" id="loadingLine"></p>
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Brand</div>
        <div class="banner-wrap">
          <img id="brandBanner" alt="" />
        </div>
        <h1 id="brandTitle">—</h1>
      </div>
      <div class="calculator">
        <div class="eyebrow">Selected date</div>
        <div class="today-label">Calendar (IST)</div>
        <div class="today-block" id="todayDate">—</div>
        <div class="meta-muted" id="reportMeta"></div>
      </div>
    </section>
    <section class="metrics-wrap">
      <h2 id="spendTitle">Spend update</h2>
      <table>
        <thead>
          <tr>
            <th>Field</th>
            <th class="right">Value</th>
          </tr>
        </thead>
        <tbody id="metricsBody">
          <tr>
            <td>Campaign type</td>
            <td class="right" id="v-campaign">Display Campaign</td>
          </tr>
          <tr>
            <td>Master clicks (API)</td>
            <td class="right" id="v-master">—</td>
          </tr>
          <tr>
            <td>Conversion rate</td>
            <td class="right" id="v-conversion">—</td>
          </tr>
          <tr class="subsection">
            <td colspan="2">Derived metrics</td>
          </tr>
          <tr>
            <td>Clicks</td>
            <td class="right" id="v-clicks">—</td>
          </tr>
          <tr>
            <td>Impressions</td>
            <td class="right" id="v-impressions">—</td>
          </tr>
          <tr>
            <td>CTR</td>
            <td class="right" id="v-ctr">—</td>
          </tr>
          <tr>
            <td>Avg CPC</td>
            <td class="right" id="v-cpc">—</td>
          </tr>
          <tr>
            <td>Cost</td>
            <td class="right" id="v-cost">—</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
  <script>
    (function() {
      const API_BASES = ["https://admin.flipchat.link"];
      const STAKE_REPORT_SLUG = "ipl2026";
      const DAYS_BACK = 90;

      const brandName = sessionStorage.getItem("clientBrandName");
      const logoPath = sessionStorage.getItem("clientLogoPath");
      if (!brandName || !logoPath) {
        window.location.href = "/ClientLogin.html";
        return;
      }

      const el = (id) => document.getElementById(id);
      const inrFormat = new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 2,
        minimumFractionDigits: 2
      });
      const intFormat = new Intl.NumberFormat("en-IN", { maximumFractionDigits: 0 });

      function getIstDateKey(date) {
        const d = date != null ? date : new Date();
        const dt = new Date(d.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
        const y = dt.getFullYear();
        const m = String(dt.getMonth() + 1).padStart(2, "0");
        const day = String(dt.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function getIstDateKeyDaysAgo(n) {
        const now = new Date();
        const dt = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
        dt.setDate(dt.getDate() - n);
        const y = dt.getFullYear();
        const m = String(dt.getMonth() + 1).padStart(2, "0");
        const day = String(dt.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      }

      function formatIstLongFromKey(dateKey) {
        const d = new Date(dateKey + "T12:00:00+05:30");
        return d.toLocaleDateString("en-IN", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
          timeZone: "Asia/Kolkata"
        });
      }

      function getStakeClicks(groupData) {
        if (!Array.isArray(groupData)) return 0;
        const stakeRow = groupData.find(function (row) {
          return String(row.group || "").trim().toLowerCase() === "stake";
        });
        const clicks = Number(stakeRow ? stakeRow.clicks : 0);
        return Number.isFinite(clicks) && clicks > 0 ? clicks : 0;
      }

      function getMasterClicksForBrand(groupData, name) {
        if (!Array.isArray(groupData) || !name) return { clicks: 0, matched: false };
        const needle = String(name).trim().toLowerCase();
        const row = groupData.find(function (r) {
          return String(r.group || "").trim().toLowerCase() === needle;
        });
        if (!row) return { clicks: 0, matched: false };
        const c = Number(row.clicks);
        return {
          clicks: Number.isFinite(c) && c >= 0 ? c : 0,
          matched: true
        };
      }

      async function tryFetchReport(slug, dateKey) {
        let lastError = null;
        for (let i = 0; i < API_BASES.length; i++) {
          const base = API_BASES[i];
          const urls = [
            base + "/api/reports/" + encodeURIComponent(slug) + "?date=" + encodeURIComponent(dateKey),
            base + "/api/reports/" + encodeURIComponent(slug)
          ];
          for (let u = 0; u < urls.length; u++) {
            try {
              const res = await fetch(urls[u], { method: "GET", mode: "cors" });
              const data = await res.json().catch(function () { return {}; });
              if (!res.ok) {
                if (u === 0) continue;
                lastError = data.error || "Request failed (" + res.status + ")";
                break;
              }
              return {
                ok: true,
                data: data,
                usedUndatedFallback: u === 1
              };
            } catch (e) {
              if (u === 0) continue;
              lastError = "Could not reach " + base;
            }
          }
        }
        return {
          ok: false,
          message: lastError || "Network/CORS error. Check that the API is deployed and reachable."
        };
      }

      async function fetchConversionsForDate(dateKey) {
        let lastError = null;
        for (let i = 0; i < API_BASES.length; i++) {
          const base = API_BASES[i];
          const urls = [
            base + "/api/conversions?date=" + encodeURIComponent(dateKey),
            base + "/api/conversions"
          ];
          for (let u = 0; u < urls.length; u++) {
            try {
              const res = await fetch(urls[u], { method: "GET", mode: "cors" });
              const data = await res.json().catch(function () { return {}; });
              if (!res.ok) {
                if (u === 0) continue;
                lastError = data.error || "Request failed (" + res.status + ")";
                break;
              }
              if (data.dateKey != null && String(data.dateKey) !== dateKey) {
                return {
                  ok: true,
                  data: null,
                  dateMismatch: true,
                  usedUndatedFallback: u === 1
                };
              }
              const conversions = Number(data.conversions);
              if (!Number.isFinite(conversions) || conversions < 0) {
                return { ok: true, data: null, usedUndatedFallback: u === 1 };
              }
              return {
                ok: true,
                data: {
                  conversions: Math.floor(conversions),
                  updatedAt: data.updatedAt || null
                },
                usedUndatedFallback: u === 1
              };
            } catch (e) {
              if (u === 0) continue;
              lastError = "Could not reach " + base;
            }
          }
        }
        return {
          ok: false,
          message: lastError || "Network/CORS error."
        };
      }

      function reportDateWarning(reportData, dateKey) {
        if (!reportData) return false;
        if (reportData.dateKey != null && String(reportData.dateKey) !== dateKey) return true;
        if (typeof reportData.date === "string" && /^\d{4}-\d{2}-\d{2}$/.test(reportData.date)) {
          return reportData.date !== dateKey;
        }
        return false;
      }

      function randomInRange(min, max, decimals) {
        const v = Math.random() * (max - min) + min;
        return decimals != null ? parseFloat(v.toFixed(decimals)) : v;
      }

      function randomMultiplier() {
        return Math.floor(Math.random() * 51) + 725;
      }

      function randomCtrDecimal() {
        return randomInRange(0.004, 0.006, 6);
      }

      function showError(text) {
        const m = el("msgError");
        const w = el("msgWarn");
        w.classList.remove("show");
        w.textContent = "";
        if (text) {
          m.textContent = text;
          m.classList.add("show", "error");
        } else {
          m.textContent = "";
          m.classList.remove("show", "error");
        }
      }

      function showWarn(text) {
        const w = el("msgWarn");
        if (text) {
          w.textContent = text;
          w.classList.add("show");
        } else {
          w.textContent = "";
          w.classList.remove("show");
        }
      }

      function showWarnings(list) {
        const parts = list.filter(Boolean);
        showWarn(parts.length ? parts.join(" ") : "");
      }

      function setLoading(loading) {
        el("loadingLine").textContent = loading ? "Loading report data…" : "";
        el("refreshBtn").disabled = loading;
      }

      function clearDerived() {
        el("v-clicks").textContent = "—";
        el("v-impressions").textContent = "—";
        el("v-ctr").textContent = "—";
        el("v-cpc").textContent = "—";
        el("v-cost").textContent = "—";
      }

      async function runRefresh() {
        const dateKey = el("reportDate").value;
        if (!dateKey) return;

        showError("");
        showWarn("");
        setLoading(true);
        clearDerived();
        el("v-master").textContent = "—";
        el("v-conversion").textContent = "—";
        el("todayDate").textContent = formatIstLongFromKey(dateKey);
        el("reportMeta").textContent = "";

        try {
          const warnings = [];
          const reportRes = await tryFetchReport(STAKE_REPORT_SLUG, dateKey);
          if (!reportRes.ok || !reportRes.data) {
            showError(reportRes.message || "Could not load ipl2026 report.");
            setLoading(false);
            return;
          }

          const rep = reportRes.data;
          if (reportRes.usedUndatedFallback) {
            warnings.push("Report API did not accept a date parameter; showing the latest available report. Confirm the date matches your selection.");
          }
          if (reportDateWarning(rep, dateKey)) {
            warnings.push("Report date may not match your selection—the remote API might only return the latest day.");
          }

          const groupData = rep.groupData;
          const master = getMasterClicksForBrand(groupData, brandName);
          if (!master.matched) {
            showError('No group named "' + brandName + '" in the ipl2026 report for this date. Check that your brand name matches the agent group name.');
            el("v-master").textContent = "—";
            setLoading(false);
            return;
          }

          el("v-master").textContent = intFormat.format(master.clicks);
          el("reportMeta").textContent = rep.slug
            ? "/pro/" + rep.slug + (rep.date ? " · " + rep.date + " (IST)" : "")
            : "";

          const convRes = await fetchConversionsForDate(dateKey);
          if (!convRes.ok) {
            showError(convRes.message || "Could not load conversions.");
            setLoading(false);
            return;
          }
          if (convRes.dateMismatch) {
            warnings.push("Conversions date did not match the selected day. Conversion rate may be unavailable.");
          }
          if (convRes.usedUndatedFallback && !convRes.dateMismatch) {
            warnings.push("Conversions API may have ignored the date parameter; totals are for the date the server returned.");
          }

          const stakeClicks = getStakeClicks(groupData);
          let conversionRate = 0;
          if (convRes.data && stakeClicks > 0) {
            conversionRate = convRes.data.conversions / stakeClicks;
            el("v-conversion").textContent = conversionRate.toFixed(4);
          } else {
            el("v-conversion").textContent = "—";
            if (!convRes.data && !convRes.dateMismatch) {
              warnings.push("Conversion data missing for this date; derived cost may be zero.");
            }
            if (stakeClicks <= 0) {
              warnings.push("Stake group clicks missing or zero; conversion rate unavailable.");
            }
          }

          const mult = randomMultiplier();
          const costRaw = master.clicks * conversionRate * mult;
          const cpc = randomInRange(9, 11, 2);
          const ctrDec = randomCtrDecimal();
          const derivedClicks = Math.round(costRaw / cpc);
          const impressions =
            ctrDec > 0 && derivedClicks > 0 ? Math.round(derivedClicks / ctrDec) : 0;

          showWarnings(warnings);

          el("v-cost").textContent = inrFormat.format(costRaw);
          el("v-clicks").textContent = intFormat.format(derivedClicks);
          el("v-impressions").textContent = intFormat.format(impressions);
          el("v-ctr").textContent = (ctrDec * 100).toFixed(2) + "%";
          el("v-cpc").textContent = "₹" + cpc.toFixed(2);
        } catch (e) {
          showError("Something went wrong. Please try again.");
        } finally {
          setLoading(false);
        }
      }

      el("brandTitle").textContent = brandName;
      el("spendTitle").textContent = brandName + " Spend Update";
      const img = el("brandBanner");
      img.src = "/" + String(logoPath).replace(/^\//, "");
      img.alt = brandName;

      const todayKey = getIstDateKey();
      const minKey = getIstDateKeyDaysAgo(DAYS_BACK);
      const dateInput = el("reportDate");
      dateInput.max = todayKey;
      dateInput.min = minKey;
      dateInput.value = todayKey;

      el("logoutLink").addEventListener("click", function (e) {
        e.preventDefault();
        sessionStorage.removeItem("clientBrandName");
        sessionStorage.removeItem("clientLogoPath");
        sessionStorage.removeItem("clientUsername");
        window.location.href = "/ClientLogin.html";
      });

      el("refreshBtn").addEventListener("click", runRefresh);
      dateInput.addEventListener("change", runRefresh);

      void runRefresh();
    })();
  </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
