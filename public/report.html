<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvera Group Click Reports</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/report-billing.css">
  <style>
    #results {
      margin-top: 18px;
    }

    #results .result {
      margin-top: 24px;
      padding: 28px;
      border-radius: 24px;
    }

    #results .total {
      margin: 10px 0 20px;
    }

    #results table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      background: var(--color-surface);
    }

    #results thead th {
      padding: 12px 14px;
      background: var(--color-bg-surface-light);
      font-weight: 700;
    }

    #results tbody td {
      padding: 12px 14px;
      border-top: 1px solid var(--color-border);
    }

    #results th.right,
    #results td.right {
      text-align: right;
    }

    @media (max-width: 760px) {
      #results .result {
        padding: 20px;
        border-radius: 18px;
      }
      #results thead th,
      #results tbody td {
        padding: 10px 10px;
      }
    }
  </style>

</head>
<body>
  <main class="card">
    <section class="layout">
      <div class="hero">
        <div class="eyebrow">Reporting</div>
        <h1>Kelvera Group Click Reports</h1>
        <div class="meta-box">
          <div class="meta-date" id="todayDate">Today:</div>
          <div class="meta-kpi" id="conversionRate">Conversion %: --</div>
          <div class="meta-muted" id="lastUpdated">Last updated (IST): --</div>
        </div>
      </div>

      <div class="calculator">
        <h2>Report Input</h2>
        <form id="reportForm" class="form-grid">
          <label for="reportDate">
            <input id="reportDate" type="date" aria-label="Report date (IST)">
          </label>
          <label for="slugInput">
            <input id="slugInput" type="text" placeholder="campaign name">
          </label>
          <button id="submitBtn" type="submit">Get Report</button>
        </form>

        <div id="message" role="alert"></div>
        <div id="results"></div>
      </div>
    </section>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/report-api.js"></script>
  <script>
    const form = document.getElementById("reportForm");
    const slugInput = document.getElementById("slugInput");
    const reportDateInput = document.getElementById("reportDate");
    const submitBtn = document.getElementById("submitBtn");
    const message = document.getElementById("message");
    const results = document.getElementById("results");
    const todayDate = document.getElementById("todayDate");
    const conversionRate = document.getElementById("conversionRate");
    const lastUpdated = document.getElementById("lastUpdated");
    let conversionCache = {
      dateKey: null,
      marker: null,
      rate: null,
      updatedAt: null,
    };

    function showMessage(text, kind) {
      message.className = `msg ${kind}`;
      message.textContent = text;
    }

    function clearMessage() {
      message.className = "";
      message.textContent = "";
    }

    function clearResults() {
      results.innerHTML = "";
    }

    function formatIstTime(iso) {
      if (!iso) return "--";
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return "--";
      return dt.toLocaleTimeString("en-IN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
        timeZone: "Asia/Kolkata",
      });
    }

    async function refreshConversionMetric(dateKey) {
      const conversionRes = await fetchConversionsForDate(dateKey);
      if (!conversionRes.ok || !conversionRes.data) {
        conversionRate.textContent = "Conversion %: --";
        lastUpdated.textContent = "Last updated (IST): --";
        return;
      }
      const conversionData = conversionRes.data;
      const marker = conversionData.updatedAt
        ? String(conversionData.updatedAt)
        : `${dateKey}:${conversionData.conversions}`;

      if (
        conversionCache.dateKey === dateKey &&
        conversionCache.marker === marker &&
        conversionCache.rate !== null
      ) {
        conversionRate.textContent = `Conversion %: ${Number(conversionCache.rate).toFixed(4)}`;
        lastUpdated.textContent = `Last updated (IST): ${formatIstTime(conversionCache.updatedAt)}`;
        return;
      }

      const stakeReport = await tryFetchReport(STAKE_REPORT_SLUG, dateKey);
      if (!stakeReport.ok || !stakeReport.data) {
        conversionRate.textContent = "Conversion %: --";
        lastUpdated.textContent = `Last updated (IST): ${formatIstTime(conversionData.updatedAt)}`;
        return;
      }

      const stakeClicks = getStakeClicks(stakeReport.data.groupData);
      const rate = stakeClicks > 0 ? conversionData.conversions / stakeClicks : 0;
      conversionRate.textContent = `Conversion %: ${rate.toFixed(4)}`;
      lastUpdated.textContent = `Last updated (IST): ${formatIstTime(conversionData.updatedAt)}`;
      conversionCache = {
        dateKey,
        marker,
        rate,
        updatedAt: conversionData.updatedAt || null,
      };
    }

    function renderResults(data) {
      if (!data || !Array.isArray(data.groupData)) {
        clearResults();
        return;
      }

      if (data.groupData.length === 0) {
        results.innerHTML = `
          <p class="empty-note">No clicks found for this slug on ${data.date} (IST).</p>
        `;
        return;
      }

      const rows = data.groupData.map((row) => `
        <tr>
          <td>${row.group}</td>
          <td class="right">${row.clicks}</td>
          <td class="right">${row.percentage}%</td>
        </tr>
      `).join("");

      results.innerHTML = `
        <div class="result">
          <p class="result-label">Daily report</p>
          <div class="total">${data.totalClicks} clicks</div>
          <p class="empty-note" style="margin-top: 0; margin-bottom: 12px;">
            /pro/${data.slug} • ${data.date} (IST)
          </p>
          <table>
            <thead>
              <tr>
                <th>Group</th>
                <th class="right">Clicks</th>
                <th class="right">%</th>
              </tr>
            </thead>
            <tbody>
              ${rows}
            </tbody>
          </table>
        </div>
      `;
    }

    const todayKey = getIstDateKey();
    reportDateInput.value = todayKey;
    reportDateInput.max = todayKey;
    todayDate.textContent = `Today: ${formatIstDate()}`;
    void refreshConversionMetric(todayKey);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMessage();
      clearResults();

      const slug = slugInput.value.trim();
      const selectedDate = reportDateInput.value || todayKey;
      if (!slug) {
        showMessage("Please enter a slug.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Loading...";

      try {
        const out = await tryFetchReport(slug, selectedDate);
        if (!out.ok) {
          showMessage(out.message || "Could not fetch report for this slug.", "error");
          return;
        }

        showMessage("Report loaded successfully.", "success");
        renderResults(out.data);
        await refreshConversionMetric(selectedDate);
      } catch {
        showMessage("Unexpected error while loading report.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Get Report";
      }
    });
  </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
