<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client login — Kelvera</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .login-page {
            min-height: 100vh;
            background: var(--color-bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-card);
        }
        .login-card h1 {
            text-align: center;
            color: var(--color-text);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-card .sub { text-align: center; color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .login-card .btn { margin-top: 8px; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Client dashboard</h1>
            <p class="sub">Sign in to view your spend report</p>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign in</button>
            </form>
            <div id="errorMsg" class="error-msg" role="alert"></div>
        </div>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('loginBtn');
            var errorEl = document.getElementById('errorMsg');
            errorEl.classList.remove('show');
            errorEl.textContent = '';
            btn.disabled = true;
            fetch('/api/client-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
            .then(function(result) {
                btn.disabled = false;
                if (result.data && result.data.error && !result.ok && result.data.error.indexOf('MongoDB') !== -1) {
                    errorEl.textContent = 'Client login requires the server to be configured with MongoDB.';
                    errorEl.classList.add('show');
                    return;
                }
                if (result.ok && result.data.success) {
                    sessionStorage.setItem('clientBrandName', result.data.brandName || '');
                    sessionStorage.setItem('clientLogoPath', result.data.logoPath || '');
                    sessionStorage.setItem('clientUsername', username);
                    window.location.href = '/ClientDashboard.html';
                } else {
                    errorEl.textContent = (result.data && result.data.error) || 'Invalid username or password';
                    errorEl.classList.add('show');
                }
            })
            .catch(function() {
                btn.disabled = false;
                errorEl.textContent = 'Sign-in failed. Please try again.';
                errorEl.classList.add('show');
            });
            return false;
        }
    </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
