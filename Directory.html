<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory — Kelvera G-Ads Reporting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="directory-page">
    <nav class="navbar">
        <div class="nav-left">
            <a href="/Dashboard.html" data-internal-home class="brand">Kelvera G-Ads Reporting</a>
            <div class="nav-links">
                <a href="/Dashboard.html" data-internal-home>Dashboard</a>
                <a href="/AddBrand.html">Add Brand</a>
                <a href="/Directory.html" class="active">Directory</a>
                <a href="/Reporting.html">Reporting</a>
                <a href="/Users.html" data-nav-admin-only>Team</a>
                <a href="/saver.html">Calculator</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-user-menu" id="navUserMenu">
                <button type="button" class="nav-user-trigger" id="navUserTrigger" aria-expanded="false" aria-haspopup="true">
                    <span class="username nav-user-name" id="navUsername">—</span>
                    <span class="nav-user-chevron" aria-hidden="true"></span>
                </button>
                <div class="nav-user-dropdown" id="navUserDropdown" role="menu" hidden>
                    <div class="nav-dropdown-section">
                        <div class="nav-dropdown-heading">Change password</div>
                        <form id="navPwdForm" class="nav-pwd-form">
                            <input type="password" id="navCurrentPwd" required autocomplete="current-password" placeholder="Current password" class="nav-pwd-input">
                            <input type="password" id="navNewPwd" required minlength="8" autocomplete="new-password" placeholder="New password (min. 8)" class="nav-pwd-input">
                            <button type="submit" class="btn btn-nav-pwd" id="navPwdSubmit">Update password</button>
                        </form>
                        <div id="navPwdStatus" class="form-status nav-pwd-status"></div>
                    </div>
                    <div class="nav-dropdown-divider"></div>
                    <button type="button" class="nav-dropdown-logout" id="logoutBtn">Log out</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="main">
        <h1 class="page-title">Directory</h1>
        <p class="page-subtitle" id="dirSubtitle">Manage brands and toggle visibility in reporting</p>
        <input type="file" id="replaceLogoInput" accept="image/*" style="display: none;">
        <div class="container">
            <div id="loading" class="loading">Loading…</div>
            <div id="error" class="error-state" style="display: none;"></div>
            <div id="brandList" class="brand-list" style="display: none;"></div>
            <div id="empty" class="empty-state" style="display: none;">No brands yet. Add brands from the Add Brand page.</div>
        </div>
    </main>

    <script>
        (function() {
            var user = sessionStorage.getItem('username');
            if (!user) { window.location.href = '/Login.html'; return; }
            document.getElementById('navUsername').textContent = user;
        })();
    </script>
    <script src="/js/internal-nav.js"></script>
    <script src="/js/internal-user-menu.js"></script>
    <script>
        var brands = [];
        var isAdminBrands = false;
        var replaceLogoTarget = null;

        document.getElementById('replaceLogoInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            e.target.value = '';
            if (!file || !file.type.startsWith('image/') || replaceLogoTarget === null) return;
            var target = replaceLogoTarget;
            replaceLogoTarget = null;
            var reader = new FileReader();
            reader.onload = function() {
                var body = target.brandId
                    ? { brandId: target.brandId, logo: reader.result }
                    : { index: target.index, logo: reader.result };
                fetch('/api/brands/logo', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(body)
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.error) {
                        document.getElementById('error').textContent = data.error;
                        document.getElementById('error').style.display = 'block';
                        return;
                    }
                    var idx = target.listIndex;
                    brands[idx].logoPath = data.logoPath || brands[idx].logoPath;
                    render();
                })
                .catch(function(err) {
                    document.getElementById('error').textContent = 'Error: ' + err.message;
                    document.getElementById('error').style.display = 'block';
                });
            };
            reader.readAsDataURL(file);
        });

        function openReplaceLogo(index) {
            var b = brands[index];
            replaceLogoTarget = isAdminBrands && b.id
                ? { brandId: b.id, listIndex: index }
                : { index: index, listIndex: index };
            document.getElementById('replaceLogoInput').click();
        }

        function deleteBrand(index) {
            var b = brands[index];
            var delBody = isAdminBrands && b.id ? { brandId: b.id } : { index: index };
            fetch('/api/brands', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(delBody)
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                    return;
                }
                brands.splice(index, 1);
                render();
            })
            .catch(function(err) {
                document.getElementById('error').textContent = 'Error: ' + err.message;
                document.getElementById('error').style.display = 'block';
            });
        }

        function setActive(index, active) {
            var b = brands[index];
            var patchBody = isAdminBrands && b.id
                ? { brandId: b.id, active: active }
                : { index: index, active: active };
            fetch('/api/brands', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(patchBody)
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.error) {
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                    return;
                }
                brands[index].active = active;
                render();
            })
            .catch(function(err) {
                document.getElementById('error').textContent = 'Error: ' + err.message;
                document.getElementById('error').style.display = 'block';
            });
        }

        function render() {
            var listEl = document.getElementById('brandList');
            var emptyEl = document.getElementById('empty');
            var loadingEl = document.getElementById('loading');

            loadingEl.style.display = 'none';

            if (brands.length === 0) {
                emptyEl.style.display = 'block';
                listEl.style.display = 'none';
                return;
            }

            emptyEl.style.display = 'none';
            listEl.style.display = 'grid';
            listEl.innerHTML = '';

            brands.forEach(function(brand, index) {
                var brandItem = document.createElement('div');
                brandItem.className = 'brand-item';

                var card = document.createElement('div');
                card.className = 'dir-card' + (brand.active ? '' : ' archived');

                var deleteBtn = document.createElement('button');
                deleteBtn.type = 'button';
                deleteBtn.className = 'delete-btn';
                deleteBtn.title = 'Delete brand';
                deleteBtn.innerHTML = '&times;';
                deleteBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (confirm('Delete this brand?')) deleteBrand(index);
                });
                card.appendChild(deleteBtn);

                var logoWrap = document.createElement('div');
                logoWrap.className = 'logo-wrap' + (brand.active ? ' clickable' : '');
                if (brand.active) {
                    logoWrap.title = 'Click to replace logo';
                    logoWrap.addEventListener('click', function() { openReplaceLogo(index); });
                }
                var img = document.createElement('img');
                img.className = 'brand-logo';
                img.src = '/' + brand.logoPath;
                img.alt = brand.name;
                img.onerror = function() { img.style.display = 'none'; };
                var replaceHint = document.createElement('div');
                replaceHint.className = 'replace-hint';
                replaceHint.textContent = 'Click to replace';
                logoWrap.appendChild(img);
                logoWrap.appendChild(replaceHint);
                card.appendChild(logoWrap);

                var nameEl = document.createElement('div');
                nameEl.className = 'brand-name';
                nameEl.textContent = brand.name;
                card.appendChild(nameEl);

                if (isAdminBrands && brand.ownerUsername) {
                    var ownerEl = document.createElement('div');
                    ownerEl.className = 'brand-owner';
                    ownerEl.textContent = 'Owner: ' + brand.ownerUsername;
                    card.appendChild(ownerEl);
                }

                var toggleRow = document.createElement('div');
                toggleRow.className = 'toggle-row';
                var label = document.createElement('label');
                label.className = 'active-toggle ' + (brand.active ? 'active-on' : 'active-off');
                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = brand.active;
                checkbox.addEventListener('change', function() {
                    setActive(index, checkbox.checked);
                });
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(brand.active ? 'Active' : 'Archived'));
                toggleRow.appendChild(label);
                brandItem.appendChild(card);
                brandItem.appendChild(toggleRow);
                listEl.appendChild(brandItem);
            });
        }

        fetch('/api/me', { credentials: 'include' })
            .then(function(res) { return res.json(); })
            .then(function(me) {
                if (!me.authenticated) {
                    window.location.href = '/Login.html';
                    return Promise.reject(new Error('auth'));
                }
                isAdminBrands = me.role === 'admin';
                if (isAdminBrands) {
                    document.getElementById('dirSubtitle').textContent =
                        'Global overview — all brands across team workspaces. Owner shows the internal user for each workspace.';
                }
                var url = isAdminBrands ? '/api/admin/brands' : '/api/brands';
                return fetch(url, { credentials: 'include' });
            })
            .then(function(res) {
                if (!res) return null;
                if (res.status === 401) { window.location.href = '/Login.html'; return Promise.reject(new Error('auth')); }
                if (res.status === 403) {
                    return res.json().then(function(data) {
                        throw new Error(data.error || 'Forbidden');
                    });
                }
                return res.json();
            })
            .then(function(data) {
                if (!data) return;
                if (data.error) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').textContent = data.error;
                    document.getElementById('error').style.display = 'block';
                    return;
                }
                document.getElementById('error').style.display = 'none';
                brands = data.brands || [];
                render();
            })
            .catch(function(err) {
                if (err && err.message === 'auth') return;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = 'Could not load brands: ' + (err && err.message ? err.message : 'unknown');
                document.getElementById('error').style.display = 'block';
            });
    </script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
