<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Kelvera G-Ads Reporting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { display: flex; flex-direction: column; }
        .main {
            flex: 1;
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .time-text {
            font-size: clamp(4rem, 22vw, 12rem);
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: 0.02em;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="/AdminDashboard.html" data-internal-home class="brand">Kelvera G-Ads Reporting</a>
            <div class="nav-links">
                <a href="/AdminDashboard.html" data-internal-home class="active">Dashboard</a>
                <a href="/AddBrand.html">Add Brand</a>
                <a href="/Directory.html">Directory</a>
                <a href="/Reporting.html">Reporting</a>
                <a href="/Users.html">Team</a>
                <a href="/saver.html">Calculator</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-user-menu" id="navUserMenu">
                <button type="button" class="nav-user-trigger" id="navUserTrigger" aria-expanded="false" aria-haspopup="true">
                    <span class="username nav-user-name" id="navUsername">—</span>
                    <span class="nav-user-chevron" aria-hidden="true"></span>
                </button>
                <div class="nav-user-dropdown" id="navUserDropdown" role="menu" hidden>
                    <div class="nav-dropdown-section">
                        <div class="nav-dropdown-heading">Change password</div>
                        <form id="navPwdForm" class="nav-pwd-form">
                            <input type="password" id="navCurrentPwd" required autocomplete="current-password" placeholder="Current password" class="nav-pwd-input">
                            <input type="password" id="navNewPwd" required minlength="8" autocomplete="new-password" placeholder="New password (min. 8)" class="nav-pwd-input">
                            <button type="submit" class="btn btn-nav-pwd" id="navPwdSubmit">Update password</button>
                        </form>
                        <div id="navPwdStatus" class="form-status nav-pwd-status"></div>
                    </div>
                    <div class="nav-dropdown-divider"></div>
                    <button type="button" class="nav-dropdown-logout" id="logoutBtn">Log out</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="time-text" id="timeText">—:—:—</div>
    </main>

    <script>
        (function() {
            var user = sessionStorage.getItem('username');
            if (!user) { window.location.href = '/Login.html'; return; }
            if (sessionStorage.getItem('role') !== 'admin') { window.location.href = '/Dashboard.html'; return; }

            document.getElementById('navUsername').textContent = user;

            function showTime() {
                var str = new Date().toLocaleTimeString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                document.getElementById('timeText').textContent = str;
            }
            showTime();
            setInterval(showTime, 1000);
        })();
    </script>
    <script src="/js/internal-nav.js"></script>
    <script src="/js/internal-user-menu.js"></script>
    <div data-shared-footer></div>
    <script src="/js/layout-shell.js"></script>
</body>
</html>
